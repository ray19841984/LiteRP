<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiteRP v0.08</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/exifreader@4.12.0/dist/exif-reader.min.js"></script>
    <style>
        body { background-color: #0f0f0f; color: #e0e0e0; font-family: 'Inter', sans-serif; overflow: hidden; }
        .chat-container { height: calc(100vh - 160px); overflow-y: auto; scroll-behavior: smooth; }
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .user-msg { background: #2a2a2a; border-radius: 15px 15px 0 15px; border: 1px solid #3a3a3a; }
        .ai-msg { background: #151515; border-radius: 15px 15px 15px 0; border: 1px solid #222; }
        .sys-msg { background: #1a1a00; color: #b3b300; border-radius: 8px; text-align: center; border: 1px solid #333300; font-size: 0.8rem; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        #sidebar { transition: transform 0.3s ease-in-out; }
        .sidebar-open { transform: translateX(0); }
        .sidebar-closed { transform: translateX(-100%); }
    </style>
</head>
<body class="flex h-screen w-full relative">

    <div id="sidebar" class="sidebar-closed absolute lg:relative z-40 w-80 h-full bg-[#121212] border-r border-white/10 flex flex-col shadow-2xl">
        <div class="p-4 border-b border-white/10 flex justify-between items-center bg-[#0a0a0a]">
            <h2 class="font-bold text-lg text-blue-400">🎭 角色與記憶面板</h2>
            <button onclick="toggleSidebar()" class="lg:hidden text-gray-400 hover:text-white">✖</button>
        </div>
        
        <div class="p-4 flex-1 overflow-y-auto">
            <div class="flex justify-between items-end mb-3">
                <h3 class="text-sm text-gray-400 font-bold">角色設定</h3>
                <label class="cursor-pointer bg-white/5 hover:bg-white/10 px-2 py-1 rounded text-xs text-blue-300 transition border border-white/10">
                    📂 匯入角色卡
                    <input type="file" id="charInput" class="hidden" accept="image/png">
                </label>
            </div>
            
            <div id="charPreview" class="hidden mb-3 flex items-center gap-3 bg-[#1a1a1a] p-2 rounded-lg border border-gray-700">
                <img id="charAvatar" src="" class="w-12 h-12 rounded-full object-cover border border-gray-600">
                <div class="text-sm font-bold text-gray-300 flex-1 truncate" id="charPreviewName">載入中...</div>
            </div>

            <input type="text" id="charName" placeholder="角色名稱 (例: 劍客阿星)" class="w-full bg-[#1a1a1a] border border-gray-700 rounded-lg p-2 text-sm text-white mb-2 focus:border-blue-500 outline-none">
            <textarea id="charPersona" rows="5" placeholder="角色個性與背景設定..." class="w-full bg-[#1a1a1a] border border-gray-700 rounded-lg p-2 text-sm text-white mb-6 focus:border-blue-500 outline-none resize-none"></textarea>

            <h3 class="text-sm text-gray-400 mb-2 font-bold flex justify-between items-end">動態記憶 (前情提要)</h3>
            <textarea id="storySummary" rows="6" placeholder="將總結的劇情貼在這裡，作為長篇 RP 的記憶庫..." class="w-full bg-[#1a1a1a] border border-gray-700 rounded-lg p-2 text-sm text-white focus:border-blue-500 outline-none resize-none"></textarea>
            <p class="text-xs text-gray-500 mt-2">提示：這些設定會每次動態打包發送給模型，節省上下文顯存。</p>
        </div>
    </div>

    <div class="flex-1 flex flex-col h-full relative">
        <div class="h-16 border-b border-white/10 flex items-center justify-between px-4 bg-[#0a0a0a]/80 backdrop-blur-md z-10">
            <div class="flex items-center gap-3">
                <button onclick="toggleSidebar()" class="text-gray-400 hover:text-white p-2 bg-white/5 rounded-lg border border-white/10">☰ 記憶面板</button>
                <div>
                    <h1 class="text-xl font-bold tracking-tighter">LiteRP <span class="text-xs text-gray-500 font-normal">v0.08</span></h1>
                    <p id="connStatus" class="text-[10px] text-green-500">● 準備連線</p>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="openSaveLoadModal()" class="bg-blue-600/30 hover:bg-blue-600/50 text-blue-400 px-3 py-1.5 rounded-lg text-sm transition border border-blue-500/30">☁️ 雲端存檔</button>
                <button onclick="openSettingsModal()" class="bg-white/5 hover:bg-white/10 text-gray-300 px-3 py-1.5 rounded-lg text-sm transition border border-white/10">⚙️ 系統設定</button>
            </div>
        </div>

        <div id="chatBox" class="chat-container p-4 md:p-8">
            <div class="sys-msg p-3 mb-4 mx-auto w-fit">歡迎來到 LiteRP v0.08！點擊左上角「記憶面板」可匯入角色卡。</div>
        </div>

        <div class="p-4 bg-[#0a0a0a] border-t border-white/10">
            <div class="max-w-4xl mx-auto relative">
                <div class="flex gap-2 mb-2">
                    <button onclick="insertSummaryPrompt()" class="text-xs bg-gray-800 hover:bg-gray-700 text-blue-300 px-3 py-1.5 rounded-full border border-gray-700 transition">
                        ✨ 產生劇情總結
                    </button>
                </div>
                
                <textarea id="userInput" rows="1" 
                    class="w-full bg-[#1a1a1a] border border-white/10 rounded-xl p-4 pr-16 focus:outline-none focus:border-blue-500 transition resize-none text-gray-200"
                    placeholder="輸入對話... (Enter 發送，Shift+Enter 換行)"></textarea>
                <button id="sendBtn" onclick="sendMessage()" class="absolute right-3 bottom-3 p-2 text-blue-500 hover:text-blue-400 transition bg-blue-500/10 rounded-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" /></svg>
                </button>
            </div>
        </div>
    </div>

    <div id="settingsModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50 backdrop-blur-sm">
        <div class="bg-[#121212] border border-white/10 rounded-2xl p-6 w-full max-w-lg shadow-2xl max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold text-white">⚙️ 系統與網路設定 (本機)</h2>
                <button onclick="closeSettingsModal()" class="text-gray-400 hover:text-white">✖</button>
            </div>
            
            <div class="mb-6 p-4 bg-white/5 rounded-xl border border-white/5">
                <h3 class="text-sm font-semibold text-blue-400 mb-3">伺服器位置 (LM Studio API)</h3>
                
                <div class="flex gap-2 mb-2">
                    <select id="serverSelect" class="flex-1 bg-[#0a0a0a] border border-gray-700 rounded-lg p-2 text-sm text-gray-200 outline-none"></select>
                    <button onclick="deleteServer()" class="bg-red-900/50 hover:bg-red-800 text-red-300 px-3 rounded-lg text-xs">刪除</button>
                </div>
                
                <div class="flex gap-2 mb-4">
                    <input type="text" id="newServerInput" class="flex-1 bg-[#0a0a0a] border border-gray-700 rounded-lg p-2 text-sm text-gray-200 outline-none placeholder-gray-600" placeholder="若放 GitHub Pages 需填入 Tailscale HTTPS">
                    <button onclick="addServer()" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-lg text-sm">新增</button>
                </div>

                <div class="border-t border-gray-700 pt-3">
                    <label class="block text-xs text-gray-400 mb-1">選擇已載入的模型</label>
                    <div class="flex gap-2">
                        <select id="modelSelect" class="flex-1 bg-[#0a0a0a] border border-gray-700 rounded-lg p-2 text-sm text-gray-200 outline-none">
                            <option value="local-model">預設模型 (local-model)</option>
                        </select>
                        <button onclick="fetchModels()" id="fetchModelsBtn" class="bg-gray-700 hover:bg-gray-600 text-white px-3 py-2 rounded-lg text-xs">抓取模型</button>
                    </div>
                    <p class="text-xs mt-1" id="modelStatusMsg"></p>
                </div>
            </div>

            <div class="mb-6 p-4 bg-white/5 rounded-xl border border-white/5">
                <h3 class="text-sm font-semibold text-blue-400 mb-3">GitHub 雲端存檔設定</h3>
                <div class="mb-3">
                    <label class="block text-xs text-gray-400 mb-1 font-bold">GitHub Token</label>
                    <input type="password" id="cfgGhToken" class="w-full bg-[#0a0a0a] border border-gray-700 rounded-lg p-2 text-sm text-gray-200">
                </div>
                <div class="flex gap-2 mb-3">
                    <div class="flex-1">
                        <label class="block text-xs text-gray-400 mb-1 font-bold">GitHub User</label>
                        <input type="text" id="cfgGhUser" class="w-full bg-[#0a0a0a] border border-gray-700 rounded-lg p-2 text-sm text-gray-200">
                    </div>
                    <div class="flex-1">
                        <label class="block text-xs text-gray-400 mb-1 font-bold">GitHub Repo</label>
                        <input type="text" id="cfgGhRepo" class="w-full bg-[#0a0a0a] border border-gray-700 rounded-lg p-2 text-sm text-gray-200">
                    </div>
                </div>
                <div>
                    <label class="block text-xs text-green-400 mb-1 font-bold">存檔加密金鑰 (AES Password)</label>
                    <input type="password" id="cfgAesKey" class="w-full bg-[#0a0a0a] border border-gray-700 rounded-lg p-2 text-sm text-gray-200" placeholder="設定一組密碼">
                </div>
            </div>

            <div class="flex justify-between items-center border-t border-gray-800 pt-4 mt-2">
                <div class="flex gap-2">
                    <button onclick="exportSysConfig()" class="px-3 py-1.5 rounded-lg text-xs bg-gray-800 text-gray-300 hover:bg-gray-700 border border-gray-700">💾 匯出本機設定</button>
                    <label class="cursor-pointer px-3 py-1.5 rounded-lg text-xs bg-gray-800 text-gray-300 hover:bg-gray-700 border border-gray-700">
                        📂 匯入
                        <input type="file" id="importSysFile" class="hidden" accept=".json">
                    </label>
                </div>
                <div class="flex gap-2">
                    <button onclick="closeSettingsModal()" class="px-4 py-2 rounded-lg text-sm bg-gray-800 text-white hover:bg-gray-700">取消</button>
                    <button onclick="saveSysConfig()" class="px-5 py-2 rounded-lg text-sm bg-blue-600 text-white font-bold hover:bg-blue-500">儲存並套用</button>
                </div>
            </div>
        </div>
    </div>

    <div id="saveLoadModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50 backdrop-blur-sm">
        <div class="bg-[#121212] border border-white/10 rounded-2xl p-6 w-full max-w-lg shadow-2xl flex flex-col max-h-[80vh]">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold text-white">☁️ GitHub 雲端存檔</h2>
                <button onclick="closeSaveLoadModal()" class="text-gray-400 hover:text-white">✖</button>
            </div>
            <div class="flex gap-2 mb-4">
                <button onclick="uploadSaveGame()" id="uploadBtn" class="flex-1 bg-green-600/30 hover:bg-green-600/50 text-green-400 border border-green-500/30 py-2 rounded-lg font-bold transition">📤 建立新存檔 (加密)</button>
                <button onclick="fetchSaveList()" id="fetchListBtn" class="flex-1 bg-blue-600/30 hover:bg-blue-600/50 text-blue-400 border border-blue-500/30 py-2 rounded-lg font-bold transition">🔄 整理存檔清單</button>
            </div>
            <div class="flex-1 overflow-y-auto bg-[#0a0a0a] border border-gray-800 rounded-lg p-2">
                <div id="saveList" class="text-sm text-gray-400 text-center py-4">點擊「整理雲端存檔清單」以載入進度</div>
            </div>
        </div>
    </div>

    <script>
        let rpState = { history: [] };
        
        let sysConfig = { 
            servers: ["http://localhost:1234/v1"], 
            currentServer: "http://localhost:1234/v1", 
            currentModel: "local-model", 
            ghToken: "", ghUser: "", ghRepo: "", aesKey: "" 
        };

        window.onload = () => {
            const saved = localStorage.getItem('liteRPSysConfig');
            if (saved) {
                let parsed = JSON.parse(saved);
                if(parsed.apiUrl && !parsed.servers) {
                    parsed.servers = [parsed.apiUrl];
                    parsed.currentServer = parsed.apiUrl;
                    parsed.currentModel = "local-model";
                }
                sysConfig = { ...sysConfig, ...parsed };
                updateConfigUI();
            }
            updateServerUI();
            updateConnStatus();
        };

        function updateConfigUI() {
            document.getElementById('cfgGhToken').value = sysConfig.ghToken || "";
            document.getElementById('cfgGhUser').value = sysConfig.ghUser || "";
            document.getElementById('cfgGhRepo').value = sysConfig.ghRepo || "";
            document.getElementById('cfgAesKey').value = sysConfig.aesKey || "";
        }

        // --- 本機設定匯出匯入 ---
        function exportSysConfig() {
            // 先確保畫面上輸入的值有存入物件
            sysConfig.currentServer = document.getElementById('serverSelect').value;
            sysConfig.currentModel = document.getElementById('modelSelect').value;
            sysConfig.ghToken = document.getElementById('cfgGhToken').value.trim();
            sysConfig.ghUser = document.getElementById('cfgGhUser').value.trim();
            sysConfig.ghRepo = document.getElementById('cfgGhRepo').value.trim();
            sysConfig.aesKey = document.getElementById('cfgAesKey').value.trim();

            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(sysConfig, null, 2));
            const dl = document.createElement('a');
            dl.setAttribute("href", dataStr);
            dl.setAttribute("download", "literp_sys_config.json");
            dl.click();
        }

        document.getElementById('importSysFile').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                try {
                    const parsed = JSON.parse(event.target.result);
                    sysConfig = { ...sysConfig, ...parsed };
                    localStorage.setItem('liteRPSysConfig', JSON.stringify(sysConfig));
                    updateConfigUI();
                    updateServerUI();
                    updateConnStatus();
                    alert("✅ 本機設定匯入成功！");
                } catch(err) { alert("❌ 設定檔格式錯誤！"); }
            };
            reader.readAsText(file);
            e.target.value = '';
        });

        function updateServerUI() {
            const select = document.getElementById('serverSelect');
            select.innerHTML = '';
            sysConfig.servers.forEach(url => {
                const opt = document.createElement('option');
                opt.value = opt.text = url;
                if(url === sysConfig.currentServer) opt.selected = true;
                select.appendChild(opt);
            });
            document.getElementById('modelSelect').innerHTML = `<option value="${sysConfig.currentModel}">${sysConfig.currentModel}</option>`;
        }

        function addServer() {
            let newUrl = document.getElementById('newServerInput').value.trim();
            if(newUrl && !sysConfig.servers.includes(newUrl)) {
                if(!newUrl.endsWith('/v1')) newUrl += '/v1';
                sysConfig.servers.push(newUrl);
                sysConfig.currentServer = newUrl;
                updateServerUI();
                document.getElementById('newServerInput').value = '';
            }
        }

        function deleteServer() {
            const url = document.getElementById('serverSelect').value;
            if(sysConfig.servers.length > 1) {
                sysConfig.servers = sysConfig.servers.filter(s => s !== url);
                sysConfig.currentServer = sysConfig.servers[0];
                updateServerUI();
            } else {
                alert("至少需保留一個伺服器位置！");
            }
        }

        async function fetchModels() {
            const serverUrl = document.getElementById('serverSelect').value;
            const select = document.getElementById('modelSelect');
            const msg = document.getElementById('modelStatusMsg');
            const btn = document.getElementById('fetchModelsBtn');
            
            btn.innerText = "⏳ 抓取中";
            msg.innerText = "";
            
            try {
                const res = await fetch(`${serverUrl}/models`);
                if(!res.ok) throw new Error();
                const data = await res.json();
                
                select.innerHTML = '';
                if(data.data && data.data.length > 0) {
                    data.data.forEach(m => {
                        const opt = document.createElement('option');
                        opt.value = opt.text = m.id;
                        select.appendChild(opt);
                    });
                    msg.innerText = "成功抓取模型！"; msg.className = "text-xs text-green-500 mt-1";
                } else {
                    select.innerHTML = '<option value="local-model">無模型</option>';
                }
            } catch (err) {
                msg.innerText = "無法連線，請檢查 IP 或 CORS。"; msg.className = "text-xs text-red-500 mt-1";
            } finally {
                btn.innerText = "抓取模型";
            }
        }

        function saveSysConfig() {
            sysConfig.currentServer = document.getElementById('serverSelect').value;
            sysConfig.currentModel = document.getElementById('modelSelect').value;
            sysConfig.ghToken = document.getElementById('cfgGhToken').value.trim();
            sysConfig.ghUser = document.getElementById('cfgGhUser').value.trim();
            sysConfig.ghRepo = document.getElementById('cfgGhRepo').value.trim();
            sysConfig.aesKey = document.getElementById('cfgAesKey').value.trim();
            
            localStorage.setItem('liteRPSysConfig', JSON.stringify(sysConfig));
            updateConnStatus();
            closeSettingsModal();
        }

        function updateConnStatus() {
            const cleanUrl = sysConfig.currentServer.replace('http://', '').replace('/v1', '');
            document.getElementById('connStatus').innerText = `● 連線: ${cleanUrl} | 模型: ${sysConfig.currentModel}`;
        }

        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            if(sb.classList.contains('sidebar-closed')) {
                sb.classList.remove('sidebar-closed'); sb.classList.add('sidebar-open');
            } else {
                sb.classList.remove('sidebar-open'); sb.classList.add('sidebar-closed');
            }
        }
        function openSettingsModal() { document.getElementById('settingsModal').classList.remove('hidden'); updateServerUI(); }
        function closeSettingsModal() { document.getElementById('settingsModal').classList.add('hidden'); }
        function openSaveLoadModal() { document.getElementById('saveLoadModal').classList.remove('hidden'); }
        function closeSaveLoadModal() { document.getElementById('saveLoadModal').classList.add('hidden'); document.getElementById('saveList').innerHTML = '點擊「整理雲端存檔清單」以載入進度';}
        function insertSummaryPrompt() {
            const input = document.getElementById('userInput');
            input.value = "Ooc:請幫我總結目前此對話，包含各主要角色狀態包含心理狀態，以及目前劇情走向。";
            input.focus();
        }

        document.getElementById('charInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                document.getElementById('charAvatar').src = event.target.result;
                document.getElementById('charPreview').classList.remove('hidden');
            };
            reader.readAsDataURL(file);

            try {
                const tags = await ExifReader.load(file);
                if (tags.chara) {
                    const decoded = decodeURIComponent(escape(window.atob(tags.chara.description)));
                    const charData = JSON.parse(decoded);
                    
                    document.getElementById('charName').value = charData.name || "";
                    document.getElementById('charPreviewName').innerText = charData.name || "已載入";
                    document.getElementById('charPersona').value = `[描述]:\n${charData.description || ""}\n\n[性格]:\n${charData.personality || ""}`;
                    
                    if (charData.first_mes) {
                        rpState.history = []; 
                        document.getElementById('chatBox').innerHTML = ''; 
                        appendMessage('ai', charData.first_mes);
                        rpState.history.push({ role: "assistant", content: charData.first_mes });
                    }
                } else {
                    alert("圖片中找不到角色資料，僅載入頭像。");
                    document.getElementById('charPreviewName').innerText = "自訂圖片";
                }
            } catch (err) {
                console.error(err);
                alert("無法解析資料，僅載入頭像。");
                document.getElementById('charPreviewName').innerText = "自訂圖片";
            }
            e.target.value = ''; 
        });

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;

            appendMessage('user', text);
            rpState.history.push({ role: "user", content: text });
            input.value = '';

            const cName = document.getElementById('charName').value || "未知角色";
            const cPersona = document.getElementById('charPersona').value || "無設定";
            const summary = document.getElementById('storySummary').value || "無前情提要";
            
            const dynamicPrompt = `你現在扮演【${cName}】。\n【角色設定】：${cPersona}\n【前情提要與當前狀態】：${summary}\n請完全沉浸在角色中，用第一人稱回答，並可以包含動作描寫(用括號表示)。不要承認自己是AI。`;

            const aiMsgDiv = appendMessage('ai', '...');
            
            try {
                if(!sysConfig.currentServer) throw new Error("尚未設定 LM Studio 伺服器");
                
                const fetchUrl = sysConfig.currentServer.endsWith('/v1') 
                    ? `${sysConfig.currentServer}/chat/completions` 
                    : sysConfig.currentServer;

                const response = await fetch(fetchUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: sysConfig.currentModel || "local-model",
                        messages: [
                            { role: "system", content: dynamicPrompt },
                            ...rpState.history
                        ],
                        temperature: 0.8
                    })
                });

                if (!response.ok) throw new Error("API 連線失敗，請檢查 Tailscale 網路與 CORS");
                
                const data = await response.json();
                const reply = data.choices[0].message.content;
                
                aiMsgDiv.innerText = reply;
                rpState.history.push({ role: "assistant", content: reply });

            } catch (err) {
                aiMsgDiv.innerText = `[系統警告] ${err.message}`;
            }
        }

        function appendMessage(role, text) {
            const chatBox = document.getElementById('chatBox');
            const div = document.createElement('div');
            const cName = document.getElementById('charName').value || "AI";
            div.className = `p-4 mb-4 text-sm w-fit max-w-[85%] ${role === 'user' ? 'user-msg ml-auto' : 'ai-msg mr-auto'}`;
            div.innerHTML = `<div class="text-xs font-bold mb-1 ${role === 'user' ? 'text-blue-400' : 'text-green-400'}">${role === 'user' ? '你' : cName}</div><div>${text.replace(/\n/g, '<br>')}</div>`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            return div.lastElementChild;
        }

        document.getElementById('userInput').onkeydown = (e) => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
        };

        function utf8ToBase64(str) {
            const bytes = new TextEncoder().encode(str);
            let binString = '';
            for (let i = 0; i < bytes.byteLength; i++) binString += String.fromCharCode(bytes[i]);
            return btoa(binString);
        }
        function base64ToUtf8(b64) {
            const binString = atob(b64);
            const bytes = new Uint8Array(binString.length);
            for (let i = 0; i < binString.length; i++) bytes[i] = binString.charCodeAt(i);
            return new TextDecoder().decode(bytes);
        }

        async function uploadSaveGame() {
            if(!sysConfig.ghToken || !sysConfig.aesKey) return alert("請先至系統設定填寫 GitHub 資訊與 AES 密碼");
            
            const btn = document.getElementById('uploadBtn');
            btn.innerText = "⏳ 上傳中...";
            
            const fullSave = {
                character: { name: document.getElementById('charName').value, persona: document.getElementById('charPersona').value },
                summary: document.getElementById('storySummary').value,
                history: rpState.history
            };

            const jsonStr = JSON.stringify(fullSave);
            const encryptedStr = CryptoJS.AES.encrypt(jsonStr, sysConfig.aesKey).toString();
            const b64Content = utf8ToBase64(encryptedStr);

            const now = new Date();
            const filename = `LiteRP_${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}.json`;

            try {
                const res = await fetch(`https://api.github.com/repos/${sysConfig.ghUser}/${sysConfig.ghRepo}/contents/${filename}`, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${sysConfig.ghToken}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: `LiteRP AutoSave ${filename}`, content: b64Content })
                });

                if (res.ok) alert(`✅ 存檔成功！\n檔名: ${filename}`);
                else alert("❌ 上傳失敗，請檢查 Repo 權限或名稱。");
            } catch(e) { alert("發生錯誤: " + e.message); }
            finally { btn.innerText = "📤 建立新存檔 (加密)"; fetchSaveList(); }
        }

        async function fetchSaveList() {
            if(!sysConfig.ghToken) return alert("請先填寫 GitHub 設定");
            const listDiv = document.getElementById('saveList');
            listDiv.innerHTML = "⏳ 讀取中...";

            try {
                const res = await fetch(`https://api.github.com/repos/${sysConfig.ghUser}/${sysConfig.ghRepo}/contents`, {
                    headers: { 'Authorization': `token ${sysConfig.ghToken}` }
                });
                if(!res.ok) throw new Error("無法讀取 Repo");
                
                const files = (await res.json()).filter(f => f.name.startsWith('LiteRP_') && f.name.endsWith('.json')).reverse();
                
                listDiv.innerHTML = '';
                if(files.length === 0) { listDiv.innerHTML = "雲端沒有存檔"; return; }

                files.forEach(file => {
                    const item = document.createElement('div');
                    item.className = "flex justify-between items-center p-3 mb-2 bg-[#1a1a1a] rounded-lg border border-gray-700 hover:border-blue-500 cursor-pointer";
                    item.innerHTML = `<span class="text-blue-300 text-sm font-mono">${file.name}</span> <button class="text-xs bg-blue-600 px-3 py-1 rounded text-white font-bold">載入</button>`;
                    item.onclick = () => loadSaveGame(file.name);
                    listDiv.appendChild(item);
                });
            } catch(e) { listDiv.innerHTML = `<span class="text-red-500">${e.message}</span>`; }
        }

        async function loadSaveGame(filename) {
            if(!sysConfig.aesKey) return alert("請先在系統設定輸入解密用的 AES 密碼！");
            if(!confirm(`確定要載入 ${filename} 嗎？目前的對話將被覆蓋。`)) return;
            
            try {
                const res = await fetch(`https://api.github.com/repos/${sysConfig.ghUser}/${sysConfig.ghRepo}/contents/${filename}`, {
                    headers: { 'Authorization': `token ${sysConfig.ghToken}` }
                });
                const data = await res.json();
                
                const encryptedStr = base64ToUtf8(data.content.replace(/\n/g, ''));
                const bytes = CryptoJS.AES.decrypt(encryptedStr, sysConfig.aesKey);
                const decryptedStr = bytes.toString(CryptoJS.enc.Utf8);
                
                if(!decryptedStr) throw new Error("密碼錯誤，無法解密！");
                
                const saveGame = JSON.parse(decryptedStr);

                rpState.history = saveGame.history;
                document.getElementById('charName').value = saveGame.character.name;
                document.getElementById('charPersona').value = saveGame.character.persona;
                document.getElementById('storySummary').value = saveGame.summary;
                
                const chatBox = document.getElementById('chatBox');
                chatBox.innerHTML = '';
                rpState.history.forEach(msg => appendMessage(msg.role === 'assistant' ? 'ai' : 'user', msg.content));

                closeSaveLoadModal();
                alert("📂 載入成功！動態記憶與角色已還原。");

            } catch(e) { alert("讀取失敗: " + e.message); }
        }
    </script>
