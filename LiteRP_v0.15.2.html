<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiteRP w/ Cloud v0.15.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/exifreader@4.12.0/dist/exif-reader.min.js"></script>
    <style>
        body { background-color: #0f0f0f; color: #e0e0e0; font-family: 'Inter', sans-serif; overflow: hidden; }
        .chat-container { height: calc(100vh - 160px); overflow-y: auto; scroll-behavior: smooth; position: relative; }
        .user-msg { background: #2a2a2a; border-radius: 15px 15px 0 15px; border: 1px solid #3a3a3a; padding: 12px 16px; margin-bottom: 16px; width: fit-content; max-width: 85%; margin-left: auto; }
        .ai-msg { background: #151515; border-radius: 15px 15px 15px 0; border: 1px solid #222; padding: 12px 16px; margin-bottom: 16px; width: fit-content; max-width: 85%; margin-right: auto; }
        .sys-msg { background: #1a1a00; color: #b3b300; border-radius: 8px; text-align: center; border: 1px solid #333300; font-size: 0.8rem; padding: 12px; margin: 0 auto 16px auto; width: fit-content; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        
        #leftSidebar, #rightSidebar { transition: all 0.3s ease-in-out; flex-shrink: 0; overflow-x: hidden; }
        .left-collapsed { width: 0 !important; border-right-width: 0 !important; opacity: 0; }
        
        @media (max-width: 1024px) {
            #leftSidebar { transform: translateX(-100%); position: absolute; z-index: 40; width: 16rem; opacity: 1; }
            #leftSidebar.open { transform: translateX(0); }
            #rightSidebar { transform: translateX(100%); position: absolute; right: 0; z-index: 40; }
            #rightSidebar.open { transform: translateX(0); }
        }
        
        .tab-btn { padding: 8px 4px; font-size: 0.75rem; color: #888; border-bottom: 2px solid transparent; transition: all 0.2s; cursor: pointer; flex: 1; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .tab-btn.active { color: #60a5fa; border-bottom: 2px solid #60a5fa; font-weight: bold; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="flex h-screen w-full relative">

    <div id="leftSidebar" class="w-64 h-full bg-[#0a0a0a] border-r border-white/10 flex flex-col shadow-2xl">
        <div class="p-4 border-b border-white/10 flex justify-between items-center bg-[#121212]">
            <h2 class="font-bold text-base text-gray-200">📚 劇本與歷史</h2>
            <button onclick="toggleLeft()" class="lg:hidden text-gray-400 hover:text-white">✖</button>
        </div>
        <div class="p-4 border-b border-white/10 flex flex-col gap-3">
            <button onclick="newStory()" class="w-full block bg-red-900/30 hover:bg-red-900/50 text-red-400 border border-red-500/30 py-2 rounded-lg text-sm transition font-bold">➕ 新建劇本 (全清空)</button>
            <button onclick="nextChapter()" class="w-full block bg-blue-900/30 hover:bg-blue-900/50 text-blue-400 border border-blue-500/30 py-2 rounded-lg text-sm transition font-bold">⏭️ 進入下一章</button>
            <button onclick="uploadSaveGame(false)" id="btnManualSave" class="w-full block bg-green-900/30 hover:bg-green-900/50 text-green-400 border border-green-500/30 py-2 rounded-lg text-sm transition font-bold">💾 儲存里程碑</button>
        </div>
        <div class="p-2 flex justify-between items-center bg-[#121212] border-b border-white/10">
            <span class="text-xs text-gray-400 font-bold ml-2">雲端存檔清單</span>
            <button onclick="fetchSaveList()" class="text-xs bg-gray-800 hover:bg-gray-700 text-white px-2 py-1 rounded">🔄 整理</button>
        </div>
        <div id="saveList" class="flex-1 overflow-y-auto p-2 space-y-1 text-xs text-gray-400 text-center pt-4">
            點擊「整理」以載入進度
        </div>
    </div>

    <div class="flex-1 flex flex-col h-full relative min-w-0">
        <div class="h-16 border-b border-white/10 flex items-center justify-between px-4 bg-[#121212]/80 backdrop-blur-md z-10 shrink-0">
            <div class="flex items-center gap-2">
                <button onclick="toggleLeft()" class="text-gray-400 hover:text-white p-2 bg-white/5 rounded-lg border border-white/10">📚</button>
                <div>
                    <h1 class="text-xl font-bold tracking-tighter">LiteRP <span class="text-xs text-blue-400 font-bold">v0.15.2</span></h1>
                    <p id="connStatus" class="text-[10px] text-green-500">● 準備連線</p>
                </div>
            </div>
            <div class="flex gap-2 items-center">
                <span id="autoSaveMsg" class="text-[10px] text-gray-500 hidden mr-2">已本機秒存</span>
                <select id="fontSizeSelect" onchange="changeFontSize(this.value)" class="bg-[#1a1a1a] text-xs text-gray-300 border border-white/10 rounded-lg px-2 py-1.5 outline-none cursor-pointer">
                    <option value="14">Aa 小</option>
                    <option value="16" selected>Aa 中</option>
                    <option value="18">Aa 大</option>
                    <option value="20">Aa 特大</option>
                </select>
                <button onclick="openSettingsModal()" class="bg-white/5 hover:bg-white/10 text-gray-300 px-3 py-1.5 rounded-lg text-sm transition border border-white/10">⚙️</button>
                <button onclick="toggleRight()" class="lg:hidden text-gray-400 hover:text-white p-2 bg-white/5 rounded-lg border border-white/10">🎭</button>
            </div>
        </div>

        <div id="chatBox" class="chat-container p-4 md:p-8">
            <div class="sys-msg">歡迎來到 v0.15.2！已重構雲端存檔例外捕捉，拒絕無聲卡死。</div>
        </div>

        <div class="absolute right-6 bottom-32 flex flex-col gap-2 z-20 opacity-50 hover:opacity-100 transition duration-300">
            <button onclick="scrollToTop()" class="bg-[#1a1a1a]/80 hover:bg-gray-700 text-gray-300 p-2.5 rounded-full border border-gray-600 shadow-2xl backdrop-blur-sm">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7" /></svg>
            </button>
            <button onclick="scrollToBottom()" class="bg-[#1a1a1a]/80 hover:bg-gray-700 text-gray-300 p-2.5 rounded-full border border-gray-600 shadow-2xl backdrop-blur-sm">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" /></svg>
            </button>
        </div>

        <div class="p-4 bg-[#0a0a0a] border-t border-white/10 shrink-0 relative z-30">
            <div class="max-w-4xl mx-auto flex flex-col gap-2">
                <div class="flex items-center justify-between px-2 text-xs">
                    <div class="flex items-center gap-2">
                        <span class="text-gray-400">當前算力分流：</span>
                        <span id="currentRouteLabel" class="font-bold text-green-400">💻 本地 (LM Studio)</span>
                    </div>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="cloudToggle" onchange="toggleCloudRoute(this.checked)" class="sr-only peer">
                        <div class="w-9 h-5 bg-gray-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-indigo-600"></div>
                        <span class="ml-2 text-gray-300 font-bold tracking-tight">🧠 雲端推理模式</span>
                    </label>
                </div>

                <div class="relative flex items-end">
                    <textarea id="userInput" rows="1" 
                        oninput="autoResize(this)"
                        style="max-height: 150px;"
                        class="w-full bg-[#1a1a1a] border border-white/10 rounded-xl p-4 pr-16 focus:outline-none focus:border-blue-500 transition resize-none text-gray-200 overflow-y-auto"
                        placeholder="輸入對話..."></textarea>
                    
                    <button id="sendBtn" onclick="sendMessage()" class="absolute right-3 bottom-3 p-2 text-blue-500 hover:text-blue-400 transition bg-blue-500/10 rounded-lg">
                        <svg id="iconSend" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 block" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" /></svg>
                        <svg id="iconStop" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 hidden" fill="currentColor" viewBox="0 0 24 24"><path d="M6 6h12v12H6z"/></svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="rightSidebar" class="w-80 h-full bg-[#121212] border-l border-white/10 flex flex-col shadow-2xl">
        <div class="p-4 border-b border-white/10 flex justify-between items-center bg-[#0a0a0a]">
            <h2 class="font-bold text-base text-blue-400">🎭 記憶面板</h2>
            <button onclick="toggleRight()" class="lg:hidden text-gray-400">✖</button>
        </div>
        <div class="flex border-b border-white/10 bg-[#0a0a0a]">
            <div class="tab-btn active" onclick="switchTab('tab-char')">👤 陣容狀態</div>
            <div class="tab-btn" onclick="switchTab('tab-summary')">📝 總結主線</div>
            <div class="tab-btn" onclick="switchTab('tab-lore')">📖 世界書</div>
        </div>
        <div class="p-4 flex-1 overflow-y-auto">
            <div id="tab-char" class="tab-content active"><div id="rosterContainer" class="space-y-4 mb-4"></div></div>
            <div id="tab-summary" class="tab-content">
                <div class="mb-5">
                    <textarea id="pinnedMemo" rows="4" placeholder="📌 主線任務與目標..." class="w-full bg-[#1a1a00]/30 border border-yellow-700/50 rounded-lg p-2 text-sm text-yellow-100 focus:border-yellow-500 outline-none resize-none" onchange="autoSaveLocal()"></textarea>
                </div>
                <hr class="border-gray-800 mb-4">
                <div class="flex justify-between items-end mb-2"><h3 class="text-sm text-gray-400 font-bold">🔄 動態劇情總結</h3><button onclick="bgAutoSummarize()" id="btnSummarize" class="bg-blue-600/30 hover:bg-blue-600/50 text-blue-300 px-2 py-1 rounded text-xs transition border border-blue-500/30">✨ AI 濃縮</button></div>
                <textarea id="storySummary" rows="8" placeholder="AI 自動濃縮的事件紀錄..." class="w-full bg-[#1a1a1a] border border-gray-700 rounded-lg p-2 text-sm text-white focus:border-blue-500 outline-none resize-none" onchange="autoSaveLocal()"></textarea>
            </div>
            <div id="tab-lore" class="tab-content"><textarea id="lorebook" rows="18" placeholder="📖 世界書格式\n關鍵字: [世界觀: 描述]" class="w-full bg-[#1a1a1a] border border-gray-700 rounded-lg p-2 text-sm text-white focus:border-blue-500 outline-none resize-none" onchange="autoSaveLocal()"></textarea></div>
        </div>
    </div>

    <div id="settingsModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center p-2 z-50 backdrop-blur-sm">
        <div class="bg-[#121212] border border-white/10 rounded-2xl p-4 md:p-6 w-[95vw] md:max-w-lg shadow-2xl max-h-[95vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-4"><h2 class="text-lg md:text-xl font-bold text-white">⚙️ 系統與網路設定</h2><button onclick="closeSettingsModal()" class="text-gray-400 hover:text-white">✖</button></div>
            
            <div class="mb-4 p-3 bg-white/5 rounded-xl border border-white/5">
                <h3 class="text-xs md:text-sm font-semibold text-blue-400 mb-2">💻 本地端模型設定 (LM Studio)</h3>
                <div class="flex gap-2 mb-2"><select id="serverSelect" class="flex-1 bg-[#0a0a0a] border border-gray-700 rounded-lg p-2 text-xs md:text-sm text-gray-200 outline-none"></select><button onclick="deleteServer()" class="bg-red-900/50 text-red-300 px-3 rounded-lg text-xs">刪除</button></div>
                <div class="flex gap-2 mb-3"><input type="text" id="newServerInput" class="flex-1 bg-[#0a0a0a] border border-gray-700 rounded-lg p-2 text-xs md:text-sm text-gray-200" placeholder="http://localhost:1234/v1"><button onclick="addServer()" class="bg-blue-600 text-white px-3 py-1.5 rounded-lg text-xs md:text-sm">新增</button></div>
                <div class="border-t border-gray-800 pt-2"><div class="flex gap-2"><select id="modelSelect" class="flex-1 bg-[#0a0a0a] border border-gray-700 rounded-lg p-2 text-xs md:text-sm text-gray-200"></select><button onclick="fetchModels()" id="fetchModelsBtn" class="bg-gray-700 text-white px-3 py-2 rounded-lg text-xs">抓取</button></div></div>
            </div>

            <div class="mb-4 p-3 bg-white/5 rounded-xl border border-white/5">
                <h3 class="text-xs md:text-sm font-semibold text-purple-400 mb-2">🧠 雲端算力大腦設定 (API)</h3>
                <div class="mb-2"><label class="block text-[10px] font-bold mb-1 text-gray-400">雲端核心供應商</label><select id="cloudProviderSelect" onchange="handleProviderChange(this.value)" class="w-full bg-[#0a0a0a] border border-gray-700 rounded-lg p-2 text-xs md:text-sm text-white outline-none"><option value="deepseek">DeepSeek 官方直連</option><option value="openrouter">OpenRouter 萬能轉發平台</option></select></div>
                <div class="mb-2"><label class="block text-[10px] font-bold mb-1 text-gray-400">雲端 API Key</label><input type="password" id="cfgCloudKey" class="w-full bg-[#0a0a0a] border border-gray-700 rounded-lg p-2 text-xs md:text-sm text-white"></div>
                <div><label class="block text-[10px] font-bold mb-1 text-gray-400">雲端模型代號 (Model ID)</label><input type="text" id="cfgCloudModel" class="w-full bg-[#0a0a0a] border border-gray-700 rounded-lg p-2 text-xs md:text-sm text-white font-mono"></div>
            </div>

            <div class="mb-4 p-3 bg-white/5 rounded-xl border border-white/5">
                <h3 class="text-xs md:text-sm font-semibold text-green-400 mb-2">📁 GitHub 雲端同步與加密</h3>
                <div class="mb-2"><label class="block text-[10px] font-bold mb-1 text-gray-400">GitHub Token</label><input type="password" id="cfgGhToken" class="w-full bg-[#0a0a0a] border border-gray-700 rounded-lg p-2 text-xs md:text-sm text-white"></div>
                <div class="flex flex-col md:flex-row gap-2 mb-2">
                    <div class="flex-1"><label class="block text-[10px] font-bold mb-1 text-gray-400">GitHub User</label><input type="text" id="cfgGhUser" class="w-full bg-[#0a0a0a] border border-gray-700 rounded-lg p-2 text-xs md:text-sm text-white"></div>
                    <div class="flex-1"><label class="block text-[10px] font-bold mb-1 text-gray-400">GitHub Repo</label><input type="text" id="cfgGhRepo" class="w-full bg-[#0a0a0a] border border-gray-700 rounded-lg p-2 text-xs md:text-sm text-white"></div>
                </div>
                <div><label class="block text-[10px] font-bold mb-1 text-yellow-500">AES 加密密碼</label><input type="password" id="cfgAesKey" class="w-full bg-[#0a0a0a] border border-gray-700 rounded-lg p-2 text-xs md:text-sm text-white"></div>
            </div>

            <div class="flex justify-between border-t border-gray-800 pt-3">
                <div class="flex gap-1.5"><button onclick="exportSysConfig()" class="px-2.5 py-1.5 rounded-lg text-[10px] bg-gray-800 text-gray-300 border border-gray-700">💾 匯出</button><label class="cursor-pointer px-2.5 py-1.5 rounded-lg text-[10px] bg-gray-800 text-gray-300 border border-gray-700">📂 匯入<input type="file" id="importSysFile" class="hidden" accept=".json"></label></div>
                <div class="flex gap-1.5"><button onclick="closeSettingsModal()" class="px-3 py-1.5 rounded-lg text-xs bg-gray-800 text-white">取消</button><button onclick="saveSysConfig()" class="px-4 py-1.5 rounded-lg text-xs bg-blue-600 text-white font-bold">儲存並套用</button></div>
            </div>
        </div>
    </div>

    <script>
        let rpState = { history: [], roster: [], summary: "", pinnedMemo: "", lore: "", msgCountSinceSave: 0 };
        let sysConfig = { 
            servers: ["http://localhost:1234/v1"], currentServer: "http://localhost:1234/v1", currentModel: "local-model", 
            cloudProvider: "deepseek", cloudKey: "", cloudModel: "deepseek-v4-pro", useCloud: false,
            ghToken: "", ghUser: "", ghRepo: "", aesKey: "", chatFontSize: 16 
        };
        let abortController = null;

        function generateUniqueId() { return Date.now().toString() + '_' + Math.random().toString(36).substr(2, 5); }
        function isTouchDevice() { return ('ontouchstart' in window) || (navigator.maxTouchPoints > 0); }

        window.onload = () => {
            const savedSys = localStorage.getItem('liteRPSysConfig');
            if (savedSys) {
                sysConfig = { ...sysConfig, ...JSON.parse(savedSys) };
                updateConfigUI(); updateServerUI(); updateConnStatus();
                document.getElementById('cloudToggle').checked = sysConfig.useCloud;
                updateRouteLabel();
            }
            document.getElementById('fontSizeSelect').value = sysConfig.chatFontSize;
            document.getElementById('userInput').placeholder = isTouchDevice() ? "輸入對話..." : "輸入對話... (Enter 發送，Shift+Enter 換行)";

            const savedState = localStorage.getItem('liteRPLocalState');
            if (savedState) {
                const parsedState = JSON.parse(savedState);
                rpState.history = parsedState.history || [];
                rpState.roster = parsedState.roster || [];
                document.getElementById('storySummary').value = parsedState.summary || "";
                document.getElementById('pinnedMemo').value = parsedState.pinnedMemo || "";
                document.getElementById('lorebook').value = parsedState.lore || "";
                rpState.history.forEach((msg, i) => { if(!msg.id) msg.id = generateUniqueId() + i; });
                renderRosterUI(); refreshChatUI();
            }
        };

        function toggleCloudRoute(checked) {
            sysConfig.useCloud = checked;
            localStorage.setItem('liteRPSysConfig', JSON.stringify(sysConfig));
            updateRouteLabel(); updateConnStatus();
        }

        function updateRouteLabel() {
            const lbl = document.getElementById('currentRouteLabel');
            if (sysConfig.useCloud) {
                const name = sysConfig.cloudProvider === 'deepseek' ? 'DeepSeek 官方' : 'OpenRouter';
                lbl.innerText = `🧠 雲端 (${name} | ${sysConfig.cloudModel})`;
                lbl.className = "font-bold text-indigo-400";
            } else {
                lbl.innerText = `💻 本地 (LM Studio | ${sysConfig.currentModel})`;
                lbl.className = "font-bold text-green-400";
            }
        }

        function handleProviderChange(val) {
            const modelInput = document.getElementById('cfgCloudModel');
            if (val === 'deepseek') modelInput.value = "deepseek-v4-pro";
            else if (val === 'openrouter') modelInput.value = "deepseek/deepseek-v4-pro";
        }

        function updateConfigUI() {
            document.getElementById('cfgGhToken').value = sysConfig.ghToken;
            document.getElementById('cfgGhUser').value = sysConfig.ghUser;
            document.getElementById('cfgGhRepo').value = sysConfig.ghRepo;
            document.getElementById('cfgAesKey').value = sysConfig.aesKey;
            document.getElementById('cloudProviderSelect').value = sysConfig.cloudProvider || "deepseek";
            document.getElementById('cfgCloudKey').value = sysConfig.cloudKey || "";
            document.getElementById('cfgCloudModel').value = sysConfig.cloudModel || "deepseek-v4-pro";
        }

        function saveSysConfig() {
            sysConfig.currentServer = document.getElementById('serverSelect').value;
            sysConfig.currentModel = document.getElementById('modelSelect').value;
            sysConfig.cloudProvider = document.getElementById('cloudProviderSelect').value;
            sysConfig.cloudKey = document.getElementById('cfgCloudKey').value.trim();
            sysConfig.cloudModel = document.getElementById('cfgCloudModel').value.trim();
            sysConfig.ghToken = document.getElementById('cfgGhToken').value.trim();
            sysConfig.ghUser = document.getElementById('cfgGhUser').value.trim();
            sysConfig.ghRepo = document.getElementById('cfgGhRepo').value.trim();
            sysConfig.aesKey = document.getElementById('cfgAesKey').value.trim();
            localStorage.setItem('liteRPSysConfig', JSON.stringify(sysConfig));
            updateRouteLabel(); updateConnStatus(); closeSettingsModal();
        }

        async function fetchAIResponse() {
            let dynamicPrompt = `你現在負責處理一個角色扮演劇本。請完全沉浸在劇情中，用語氣和動作(用括號表示)推動故事，不要承認自己是AI。

            【系統強制寫作規範】：AI 每次的回應字數嚴格要求在 2000 至 2500 字元以上。請極度詳細地描寫場景、環境氛圍、角色的細微表情、內心掙扎、動作細節與對白。不可敷衍跳過劇情，請展開細節鋪陳。\n\n`;
            const pinned = document.getElementById('pinnedMemo').value;
            if(pinned) dynamicPrompt += `【📌 絕對主線目標與規則】：\n${pinned}\n\n`;
            dynamicPrompt += `【當前出場的主角陣容】：\n`;
            rpState.roster.forEach(char => { 
                dynamicPrompt += `--- [${char.name}] ---\n${char.persona}\n`;
                if(char.status) dynamicPrompt += `【當前狀態】：${char.status}\n`;
            });
            const summary = document.getElementById('storySummary').value;
            if(summary) dynamicPrompt += `\n【前情提提要與事件紀錄】：\n${summary}\n`;
            
            let lastUserText = "";
            for(let i = rpState.history.length - 1; i >= 0; i--) {
                if(rpState.history[i].role === 'user') { lastUserText = rpState.history[i].content; break; }
            }
            dynamicPrompt += parseLorebook(lastUserText);

            const recentHistory = rpState.history.slice(-15).map(m => ({ role: m.role, content: m.content }));
            const aiId = generateUniqueId();
            const finalName = rpState.roster.length === 1 ? rpState.roster[0].name : '劇情回應';
            
            const chatBox = document.getElementById('chatBox');
            const aiMsgDiv = document.createElement('div');
            aiMsgDiv.className = 'ai-msg group relative';
            aiMsgDiv.innerHTML = `<div class="text-xs font-bold mb-1 text-green-400">${finalName}</div><div id="msgText_${aiId}" class="chat-msg-text" style="font-size: ${sysConfig.chatFontSize}px;">...</div>`;
            chatBox.appendChild(aiMsgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
            
            let textContainer = document.getElementById(`msgText_${aiId}`);
            let fullReply = "";

            try {
                let fetchUrl = "";
                let headers = { 'Content-Type': 'application/json' };
                let targetModel = "local-model";
                let maxTokensParam = -1;

                if (sysConfig.useCloud) {
                    if(!sysConfig.cloudKey) throw new Error("請先在設定中填入雲端 API 密鑰！");
                    targetModel = sysConfig.cloudModel;
                    headers['Authorization'] = `Bearer ${sysConfig.cloudKey}`;
                    maxTokensParam = 4096;
                    
                    if (sysConfig.cloudProvider === 'deepseek') {
                        fetchUrl = "https://api.deepseek.com/chat/completions";
                    } else if (sysConfig.cloudProvider === 'openrouter') {
                        fetchUrl = "https://openrouter.ai/api/v1/chat/completions";
                        headers['HTTP-Referer'] = window.location.href;
                        headers['X-Title'] = "LiteRP Web App";
                    }
                } else {
                    if(!sysConfig.currentServer) throw new Error("尚未設定 LM Studio API 連線");
                    fetchUrl = sysConfig.currentServer.endsWith('/v1') ? `${sysConfig.currentServer}/chat/completions` : sysConfig.currentServer;
                    targetModel = sysConfig.currentModel;
                }
                
                abortController = new AbortController();
                setGenerateState(true);

                const response = await fetch(fetchUrl, {
                    method: 'POST', headers: headers,
                    body: JSON.stringify({ 
                        model: targetModel, 
                        messages: [ { role: "system", content: dynamicPrompt }, ...recentHistory ], 
                        temperature: 0.8, 
                        max_tokens: maxTokensParam,
                        stream: true
                    }),
                    signal: abortController.signal
                });
                if (!response.ok) throw new Error(`網路錯誤代碼: ${response.status}`);

                const reader = response.body.getReader();
                const decoder = new TextDecoder("utf-8");
                textContainer.innerHTML = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    const chunk = decoder.decode(value, { stream: true });
                    const lines = chunk.split('\n').filter(line => line.trim() !== '');
                    for (const line of lines) {
                        if (line.includes('[DONE]')) continue;
                        if (line.startsWith('data:')) {
                            try {
                                const parsed = JSON.parse(line.replace(/^data:\s*/, ''));
                                if (parsed.choices && parsed.choices[0].delta && parsed.choices[0].delta.content) {
                                    fullReply += parsed.choices[0].delta.content;
                                    textContainer.innerHTML = fullReply.replace(/\n/g, '<br>');
                                }
                            } catch(e) {}
                        }
                    }
                }
            } catch (err) {
                textContainer.innerHTML = `<span class="text-red-500">[網管通訊警告] ${err.name === 'AbortError' ? '已中斷生成' : err.message}</span>`;
            } finally {
                setGenerateState(false); abortController = null;
                if(fullReply) {
                    rpState.history.push({ id: aiId, role: "assistant", content: fullReply, name: finalName });
                    const actionDiv = document.createElement('div');
                    actionDiv.id = `actions_${aiId}`;
                    actionDiv.className = "mt-2 pt-2 border-t border-gray-800/50 flex gap-3 justify-end opacity-0 group-hover:opacity-100 transition duration-300";
                    actionDiv.innerHTML = `
                        <button onclick="regenerateMsg('${aiId}')" class="text-[10px] text-gray-400 hover:text-blue-400 font-bold flex items-center gap-1">🔄 重生</button>
                        <button onclick="continueMsg()" class="text-[10px] text-gray-400 hover:text-green-400 font-bold flex items-center gap-1">▶️ 繼續</button>
                        <button onclick="editMsg('${aiId}')" class="text-[10px] text-gray-400 hover:text-yellow-400 font-bold flex items-center gap-1">✏️ 編輯</button>
                        <button onclick="deleteMsg('${aiId}')" class="text-[10px] text-gray-400 hover:text-red-400 font-bold flex items-center gap-1">🗑️ 刪除</button>
                    `;
                    aiMsgDiv.appendChild(actionDiv);
                    autoSaveLocal();
                    rpState.msgCountSinceSave++; if(rpState.msgCountSinceSave >= 5) { uploadSaveGame(true); rpState.msgCountSinceSave = 0; }
                }
            }
        }

        // --- 🤖 雲端存檔健全化核心 Hotfix (解決無聲卡死與例外遺漏) ---
        async function uploadSaveGame(isAutoSave = false) {
            if(!sysConfig.ghToken || !sysConfig.aesKey) {
                if(!isAutoSave) alert("❌ 儲存失敗：請先確認 GitHub Token 與 AES 密碼已在設定中填寫！");
                return;
            }
            const btn = document.getElementById('btnManualSave'); 
            if(!isAutoSave) btn.innerText = "⏳ 備援中...";
            
            const fullSave = { roster: rpState.roster, summary: document.getElementById('storySummary').value, pinnedMemo: document.getElementById('pinnedMemo').value, lore: document.getElementById('lorebook').value, history: rpState.history };
            const jsonStr = JSON.stringify(fullSave); 
            const b64Content = utf8ToBase64(CryptoJS.AES.encrypt(jsonStr, sysConfig.aesKey).toString());
            // 取得符合台灣時區 (GMT+8) 的本地時間字串
            const now = new Date();
            const pad = (n) => String(n).padStart(2, '0');
            const localTimeStr = `${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}_${pad(now.getHours())}${pad(now.getMinutes())}${pad(now.getSeconds())}`;
            
            let filename = isAutoSave ? "LiteRP_AutoSave.json" : `LiteRP_${localTimeStr}.json`;
            
            try {
                const listRes = await fetch(`https://api.github.com/repos/${sysConfig.ghUser}/${sysConfig.ghRepo}/contents?t=${Date.now()}`, { 
                    headers: { 'Authorization': `token ${sysConfig.ghToken}` } 
                });
                
                if(!listRes.ok) throw new Error(`讀取 GitHub 倉庫失敗 (代碼: ${listRes.status})。請檢查你的 Settings 裡 Actions 讀寫權限或 Repo、User 名字是否打錯！`);
                
                const files = await listRes.json(); 
                if(!isAutoSave) await enforceSaveLimit(files); 
                const existing = files.find(f => f.name === filename);
                const bodyData = { message: `LiteRP Save ${filename}`, content: b64Content }; 
                if(existing) bodyData.sha = existing.sha;
                
                const res = await fetch(`https://api.github.com/repos/${sysConfig.ghUser}/${sysConfig.ghRepo}/contents/${filename}`, { 
                    method: 'PUT', 
                    headers: { 'Authorization': `token ${sysConfig.ghToken}`, 'Content-Type': 'application/json' }, 
                    body: JSON.stringify(bodyData) 
                });
                
                if(!res.ok) throw new Error(`寫入 GitHub 檔案失敗 (代碼: ${res.status})`);
                
                if (!isAutoSave) alert(`✅ 雲端存檔成功！\n檔名: ${filename}`);
            } catch(err) {
                console.error(err);
                if(!isAutoSave) alert(`❌ 網管通訊阻斷警告：\n${err.message}`);
            } finally { 
                if(!isAutoSave) { 
                    btn.innerText = "💾 儲存里程碑"; 
                    fetchSaveList(); 
                } 
            }
        }

        function utf8ToBase64(str) { const bytes=new TextEncoder().encode(str); let b=''; for(let i=0;i<bytes.byteLength;i++)b+=String.fromCharCode(bytes[i]); return btoa(b); }
        function base64ToUtf8(b64) { const bin=atob(b64); const bytes=new Uint8Array(bin.length); for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i); return new TextDecoder().decode(bytes); }
        function exportSysConfig() { const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(sysConfig, null, 2)); const dl = document.createElement('a'); dl.setAttribute("href", dataStr); dl.setAttribute("download", "literp_sys_config.json"); dl.click(); }
        document.getElementById('importSysFile').addEventListener('change', (e) => { const file = e.target.files[0]; if (!file) return; const reader = new FileReader(); reader.onload = (event) => { try { sysConfig = { ...sysConfig, ...JSON.parse(event.target.result) }; localStorage.setItem('liteRPSysConfig', JSON.stringify(sysConfig)); updateConfigUI(); updateServerUI(); updateConnStatus(); updateRouteLabel(); alert("✅ 匯入成功！"); } catch(err) { alert("❌ 設定檔錯誤！"); } }; reader.readAsText(file); e.target.value = ''; });
        async function fetchSaveList() { if(!sysConfig.ghToken) return; const listDiv = document.getElementById('saveList'); listDiv.innerHTML = "..."; try { const res = await fetch(`https://api.github.com/repos/${sysConfig.ghUser}/${sysConfig.ghRepo}/contents?t=${Date.now()}`, { headers: { 'Authorization': `token ${sysConfig.ghToken}` } }); const files = (await res.json()).filter(f => f.name.startsWith('LiteRP_') && f.name.endsWith('.json')).reverse(); listDiv.innerHTML = ''; if(files.length === 0) { listDiv.innerHTML = "無紀錄"; return; } files.forEach(file => { const isAuto = file.name === "LiteRP_AutoSave.json"; const item = document.createElement('div'); item.className = "flex justify-between items-center p-2 mb-1 bg-[#1a1a1a] rounded-lg border border-gray-700 hover:border-blue-500 cursor-pointer"; item.innerHTML = `<span class="text-blue-300 font-mono truncate" style="max-width:140px;">${isAuto ? '🔄 AutoSave' : '📄 '+file.name.replace('LiteRP_', '').replace('.json', '')}</span> <button class="text-[10px] bg-blue-600 px-2 py-1 rounded text-white font-bold">載入</button>`; item.onclick = () => loadSaveGame(file.name); listDiv.appendChild(item); }); } catch(e) { listDiv.innerHTML = `失敗`; } }
        async function loadSaveGame(filename) { if(!sysConfig.aesKey) return alert("請輸入 AES 密碼！"); if(!confirm(`確定要載入 ${filename} 嗎？`)) return; try { const res = await fetch(`https://api.github.com/repos/${sysConfig.ghUser}/${sysConfig.ghRepo}/contents/${filename}?t=${Date.now()}`, { headers: { 'Authorization': `token ${sysConfig.ghToken}` } }); const data = await res.json(); const decryptedStr = CryptoJS.AES.decrypt(base64ToUtf8(data.content.replace(/\n/g, '')), sysConfig.aesKey).toString(CryptoJS.enc.Utf8); const saveGame = JSON.parse(decryptedStr); rpState.history = saveGame.history; rpState.roster = saveGame.roster || []; document.getElementById('storySummary').value = saveGame.summary || ""; document.getElementById('pinnedMemo').value = saveGame.pinnedMemo || ""; if(saveGame.lore !== undefined) document.getElementById('lorebook').value = saveGame.lore; rpState.history.forEach((msg, i) => { if(!msg.id) msg.id = generateUniqueId() + i; }); renderRosterUI(); refreshChatUI(); autoSaveLocal(); alert("📂 載入成功！"); } catch(e) { alert("讀取失敗"); } }
    </script>
</body>
</html>
